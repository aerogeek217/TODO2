<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Small box top-left -->
  <rect x="2" y="2" width="8" height="8" rx="2" stroke="url(#g)" stroke-width="2.5" fill="none"/>
  <!-- Large box center-right, checked -->
  <rect x="13" y="3" width="16" height="16" rx="3" stroke="url(#g)" stroke-width="2.5" fill="none"/>
  <polyline points="16.5,12 20,16 27,6.5" stroke="url(#g)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Medium box bottom-center -->
  <rect x="5" y="20" width="12" height="11" rx="2.5" stroke="url(#g)" stroke-width="2.5" fill="none"/>
</svg>
